name: Build macOS Universal App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]  # ARM and Intel builds

    steps:
      - uses: actions/checkout@v3

      # Setup Python for the right architecture
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app with PyInstaller
        run: |
          pyinstaller --windowed --name ProcureApp-${{ matrix.arch }} \
            --icon res/logo.icns \
            --add-data "styles/*.css:styles" \
            --add-data "res/*.png:res" \
            starting.py

      - name: Prepare for Universal Binary
        if: ${{ matrix.arch == 'x64' }}
        run: |
          # arm64 build already exists, move x64 build for lipo
          mv dist/ProcureApp-x64.app dist/ProcureApp-x86_64.app

  universal:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Install lipo
        run: brew install lipo

      - name: Create Universal Binary
        run: |
          # Combine binaries
          lipo -create \
            dist/ProcureApp-arm64.app/Contents/MacOS/ProcureApp-arm64 \
            dist/ProcureApp-x86_64.app/Contents/MacOS/ProcureApp-x86_64 \
            -output dist/ProcureApp.app/Contents/MacOS/ProcureApp
          
          # Copy Resources and Info.plist from ARM build
          cp -R dist/ProcureApp-arm64.app/Contents/Resources/* dist/ProcureApp.app/Contents/Resources/
          cp dist/ProcureApp-arm64.app/Contents/Info.plist dist/ProcureApp.app/Contents/

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Procure Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "dist/ProcureApp.app" 200 190 \
            --app-drop-link 400 190 \
            "dist/ProcureApp.dmg" \
            "dist/"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcureApp-DMG
          path: dist/ProcureApp.dmg
