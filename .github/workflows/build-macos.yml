name: Build macOS Universal App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python (arm64)
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Generate .icns icon from logo.png
        run: |
          mkdir AppIcon.iconset
          sips -z 16 16     res/logo.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32     res/logo.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     res/logo.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64     res/logo.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   res/logo.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256   res/logo.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   res/logo.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512   res/logo.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   res/logo.png --out AppIcon.iconset/icon_512x512.png
          cp res/logo.png AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o res/icon.icns

      - name: Build arm64 .app
        run: |
          pyinstaller --windowed --name ProcureApp \
            --icon res/icon.icns \
            --add-data "styles/*.css:styles" \
            --add-data "res/*.png:res" \
            starting.py
          mv dist/ProcureApp.app dist/ProcureApp-arm64.app

      - name: Build x86_64 .app (Rosetta)
        run: |
          arch -x86_64 /usr/bin/python3 -m venv venv_x86
          source venv_x86/bin/activate
          pip install --upgrade pip
          pip install pyinstaller -r requirements.txt
          pyinstaller --windowed --name ProcureApp \
            --icon res/icon.icns \
            --add-data "styles/*.css:styles" \
            --add-data "res/*.png:res" \
            starting.py
          mv dist/ProcureApp.app dist/ProcureApp-x86_64.app

      - name: Merge into Universal Binary
        run: |
          mkdir -p dist/ProcureApp-universal.app
          cp -R dist/ProcureApp-arm64.app/ dist/ProcureApp-universal.app
          lipo -create -output dist/ProcureApp-universal.app/Contents/MacOS/ProcureApp \
            dist/ProcureApp-arm64.app/Contents/MacOS/ProcureApp \
            dist/ProcureApp-x86_64.app/Contents/MacOS/ProcureApp

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Procure Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            "dist/ProcureApp.dmg" \
            "dist/ProcureApp-universal.app"

      - name: Upload macOS Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: ProcureApp
          path: dist/ProcureApp.dmg
