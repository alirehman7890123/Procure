name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches: [ main ]   # change if your branch is "main" instead

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build macOS .app
        run: |
          pyinstaller --windowed --name ProcureApp \
            --add-data "styles/*.css:styles" \
            --add-data "res/*.png:res" \
            starting.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Procure Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 190 \
            "dist/Procure.dmg" \
            "dist/"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ProcureApp-dmg
          path: dist/Procure.dmg
