name: Build Debian 12 App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build in Debian 12
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app debian:12 bash -c "
            apt-get update &&
            apt-get install -y python3 python3-pip python3-dev python3-venv patchelf build-essential &&
            python3 -m pip install --upgrade pip &&
            pip install pyinstaller -r requirements.txt &&
            pyinstaller --windowed  --onefile --name ProcureApp \
              --icon res/logo.png \
              --add-data 'styles/*.css:styles' \
              --add-data 'res/*.png:res' \
              starting.py
          "

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProcureApp-Debian12
          path: dist/ProcureApp
