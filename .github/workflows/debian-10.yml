name: Build Debian 11 Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # --------------------------
      # Run inside Debian 11 container
      # --------------------------
      - name: Build inside Debian 11
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            debian:11 bash -c "
              set -e
              apt-get update
              apt-get install -y python3 python3-pip python3-venv python3-distutils python3-dev \
                                 build-essential git
              
              python3 -m pip install --upgrade pip wheel setuptools
              pip install pyinstaller -r requirements.txt
              
              pyinstaller --onefile --name ProcureApp \
                --add-data 'styles/*.css:styles' \
                --add-data 'res/*.png:res' \
                starting.py
            "

      # --------------------------
      # Upload Artifacts
      # --------------------------
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProcureApp-Debian11
          path: dist/ProcureApp
