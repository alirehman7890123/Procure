name: Build Debian App (Python 3.10)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # modern runner with Python 3.10 support

    steps:
      - uses: actions/checkout@v3

      # --------------------------
      # Setup Python
      # --------------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # --------------------------
      # Install system dependencies
      # --------------------------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev python3-pyqt5 \
            libgl1 libxkbcommon-x11-0 \
            patchelf

      # --------------------------
      # Install Python dependencies
      # --------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      # --------------------------
      # Build with PyInstaller
      # --------------------------
      - name: Build App
        run: |
          pyinstaller --windowed --name ProcureApp \
            --icon res/logo.png \
            --add-data "styles/*.css:styles" \
            --add-data "res/*.png:res" \
            starting.py

      # --------------------------
      # Upload Artifacts
      # --------------------------
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ProcureApp-Linux
          path: dist/ProcureApp/
